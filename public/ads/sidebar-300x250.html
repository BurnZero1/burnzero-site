<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=300"/>
  <title>Burn Zero — Medium Rectangle 300×250</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 300px; height: 250px; overflow: hidden; }
    body { font-family: Inter, system-ui, sans-serif; background: #0a0a0a; }

    .ad {
      width: 300px;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0a0a0a 0%, #142010 45%, #0a0a0a 100%);
      border: 2px solid #5e8725;
      text-decoration: none;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .ad::after {
      content: '';
      position: absolute;
      bottom: -50px;
      right: -50px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(132, 180, 48, 0.2) 0%, transparent 68%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .logo-img {
      width: 104px;
      height: 104px;
      object-fit: contain;
      border-radius: 20px;
    }

    .logo-main {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #84b430;
    }

    .logo-main span { color: #fff; }

    .tagline {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <a class="ad" href="https://www.burn-zero.com" target="_blank" rel="noopener noreferrer" aria-label="Burn Zero">
    <div class="brand">
      <img class="logo-img" src="https://www.burn-zero.com/logo.png" alt="" width="104" height="104"/>
      <div class="logo-main">Burn<span>Zero</span></div>
      <div class="tagline">blockchain - AI</div>
    </div>
  </a>
</body>
</html>
