<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1080"/>
  <title>Burn Zero — Leaderboard 1080×496</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 496px; overflow: hidden; }
    body { font-family: Inter, system-ui, sans-serif; background: #0a0a0a; }

    .ad-shell {
      width: 1080px;
      height: 496px;
      position: relative;
      border: 3px solid #5e8725;
      background: #0a0a0a;
    }

    .ad-track {
      display: flex;
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .ad-track::-webkit-scrollbar { display: none; }

    .ad-page {
      flex: 0 0 1080px;
      width: 1080px;
      height: 496px;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      padding: 0 48px;
      background: linear-gradient(105deg, #0a0a0a 0%, #142010 55%, #0a0a0a 100%);
      position: relative;
      overflow: hidden;
      color: #fff;
    }

    .ad-page::before {
      content: '';
      position: absolute;
      right: -80px;
      top: -80px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(132, 180, 48, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-1 {
      justify-content: center;
    }

    .page-1-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 28px;
      position: relative;
      z-index: 1;
      max-width: 900px;
    }

    .logo-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 28px;
    }

    .logo-main {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #84b430;
    }

    .logo-main span { color: #fff; }

    .page-1-headline {
      font-size: 38px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .page-1-headline em {
      font-style: normal;
      color: #84b430;
    }

    .page-2 {
      gap: 36px;
    }

    .page-2-intro {
      flex-shrink: 0;
      width: 220px;
    }

    .eyebrow {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #84b430;
    }

    .page-2-title {
      margin-top: 12px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.25;
      color: #a1a1aa;
    }

    .steps {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .step {
      min-width: 0;
      padding: 28px 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: #84b430;
      color: #0a0a0a;
      font-size: 20px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .step-title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.2;
    }

    .page-3 {
      justify-content: center;
    }

    .page-3-text {
      position: relative;
      z-index: 1;
      max-width: 920px;
      font-size: 34px;
      font-weight: 700;
      line-height: 1.45;
      letter-spacing: -0.01em;
      text-align: center;
      color: #d4d4d8;
    }

    .nav {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
    }

    .nav-btn {
      pointer-events: auto;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(132, 180, 48, 0.35);
      border-radius: 999px;
      background: rgba(10, 10, 10, 0.82);
      color: #84b430;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .ad-shell:hover .nav-btn,
    .ad-shell:focus-within .nav-btn {
      opacity: 1;
    }

    .nav-btn:disabled {
      opacity: 0.25 !important;
      cursor: default;
    }

    .dots {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 0;
      padding: 0;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
    }

    .dot.is-active {
      background: #84b430;
    }

    .hint {
      position: absolute;
      right: 20px;
      bottom: 18px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #71717a;
      pointer-events: none;
    }
  </style>
</head>
<body data-ad-unit="leaderboard-1080x496">
  <div class="ad-shell">
    <div class="ad-track" id="track" aria-label="Burn Zero — conciliación de deuda de CO₂">
      <!-- Page 1 -->
      <section class="ad-page page-1">
        <div class="page-1-inner">
          <img class="logo-img" src="https://www.burn-zero.com/logo.png" alt="" width="120" height="120"/>
          <div class="logo-main">Burn<span>Zero</span></div>
          <div class="page-1-headline">Concilia tu <em>deuda de CO₂</em> con certificados verificados</div>
        </div>
      </section>

      <!-- Page 2: Cómo funciona -->
      <section class="ad-page page-2">
        <div class="page-2-intro">
          <div class="eyebrow">Cómo funciona</div>
          <div class="page-2-title">De principio a fin</div>
        </div>
        <div class="steps">
          <article class="step">
            <div class="step-num">01</div>
            <div class="step-title">Registra deuda CO₂</div>
          </article>
          <article class="step">
            <div class="step-num">02</div>
            <div class="step-title">Enlaza certificado</div>
          </article>
          <article class="step">
            <div class="step-num">03</div>
            <div class="step-title">Concilia en blockchain</div>
          </article>
        </div>
      </section>

      <!-- Page 3 -->
      <section class="ad-page page-3">
        <p class="page-3-text">
          via API · conciliacion AI · prueba on-chain auditable · transparente, trazable, immutable
        </p>
      </section>
    </div>

    <div class="nav" aria-hidden="true">
      <button type="button" class="nav-btn" id="prev" aria-label="Página anterior">‹</button>
      <button type="button" class="nav-btn" id="next" aria-label="Página siguiente">›</button>
    </div>

    <div class="dots" id="dots" aria-label="Navegación de páginas">
      <button type="button" class="dot is-active" data-page="0" aria-label="Página 1"></button>
      <button type="button" class="dot" data-page="1" aria-label="Página 2"></button>
      <button type="button" class="dot" data-page="2" aria-label="Página 3"></button>
    </div>

    <div class="hint">Desliza →</div>
  </div>

  <script>
    (function () {
      var track = document.getElementById('track');
      var prev = document.getElementById('prev');
      var next = document.getElementById('next');
      var dots = Array.prototype.slice.call(document.querySelectorAll('.dot'));
      var pageCount = 3;
      var pageWidth = 1080;

      function currentPage() {
        return Math.round(track.scrollLeft / pageWidth);
      }

      function goTo(page) {
        var clamped = Math.max(0, Math.min(pageCount - 1, page));
        track.scrollTo({ left: clamped * pageWidth, behavior: 'smooth' });
      }

      function syncUI() {
        var page = currentPage();
        dots.forEach(function (dot, index) {
          dot.classList.toggle('is-active', index === page);
        });
        prev.disabled = page === 0;
        next.disabled = page === pageCount - 1;
      }

      prev.addEventListener('click', function () { goTo(currentPage() - 1); });
      next.addEventListener('click', function () { goTo(currentPage() + 1); });
      dots.forEach(function (dot) {
        dot.addEventListener('click', function () {
          goTo(Number(dot.getAttribute('data-page')));
        });
      });
      track.addEventListener('scroll', syncUI, { passive: true });
      syncUI();
    })();
  </script>
  <script src="/ads/ad-track.js" defer></script>
</body>
</html>
